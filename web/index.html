<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Forge" />
  <meta name="description" content="Durable AI coding agents — chat, resume, and talk to your forge sessions." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>Forge</title>
</head>
<body>
  <!-- App shell. Three panes on desktop (sessions | chat | none),
       a single stack on mobile with a slide-in drawer. -->
  <div id="app" class="app">
    <!-- ============ Session list (drawer on mobile) ============ -->
    <aside id="sessions-pane" class="pane sessions-pane" aria-label="Sessions">
      <header class="pane-header">
        <div class="brand">
          <img src="icon.svg" alt="" class="brand-logo" width="22" height="22" />
          <h1>Forge</h1>
        </div>
        <button id="new-chat-btn" class="btn btn-primary btn-sm" title="New chat" aria-label="New chat">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>New</span>
        </button>
      </header>

      <div id="sessions-list" class="sessions-list" role="list">
        <div class="empty-hint">No sessions yet</div>
      </div>

      <footer class="pane-footer">
        <button id="settings-btn" class="btn btn-ghost btn-sm" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          <span>Settings</span>
        </button>
        <div id="user-chip" class="user-chip" hidden></div>
        <button id="logout-btn" class="btn btn-ghost btn-sm" title="Log out" aria-label="Log out" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </footer>
    </aside>

    <!-- ============ Chat pane ============ -->
    <main id="chat-pane" class="pane chat-pane" aria-label="Chat">
      <header class="pane-header chat-header">
        <button id="back-btn" class="btn btn-ghost icon-btn" title="Back" aria-label="Back">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="chat-title" class="chat-title">Forge</div>
        <div id="chat-status" class="chat-status"></div>
      </header>

      <div id="messages" class="messages" role="log" aria-live="polite" aria-atomic="false">
        <div class="welcome">
          <img src="icon.svg" alt="" width="64" height="64" />
          <h2>Forge</h2>
          <p>Durable AI coding agents. Pick a session or start a new chat.</p>
        </div>
      </div>

      <form id="composer" class="composer" autocomplete="off">
        <button id="mic-btn" type="button" class="btn btn-ghost icon-btn composer-btn" title="Hold or tap to dictate" aria-label="Dictate" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <textarea id="input" class="input" rows="1" placeholder="Send a message…" enterkeyhint="send" inputmode="text"></textarea>
        <button id="speak-btn" type="button" class="btn btn-ghost icon-btn composer-btn" title="Speak last reply" aria-label="Speak last reply" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M11 5 6 9H3v6h3l5 4V5Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/><path d="M16 9a4 4 0 0 1 0 6M19 6a8 8 0 0 1 0 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button id="send-btn" type="submit" class="btn btn-primary icon-btn" title="Send" aria-label="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M5 12l14-7-7 14-2-5-5-2Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></svg>
        </button>
      </form>
    </main>

    <!-- ============ Overlays ============ -->
    <!-- Mobile drawer scrim -->
    <div id="scrim" class="scrim" hidden></div>

    <!-- New chat modal -->
    <dialog id="new-chat-dialog" class="dialog">
      <form method="dialog" id="new-chat-form">
        <h3>New chat</h3>
        <label class="field">
          <span>Profile</span>
          <select id="profile-select" required></select>
        </label>
        <label class="field">
          <span>Title <small>(optional)</small></span>
          <input id="new-chat-title" type="text" placeholder="Auto from first message" />
        </label>
        <div class="dialog-actions">
          <button type="button" value="cancel" class="btn btn-ghost" data-close>Cancel</button>
          <button type="submit" value="create" class="btn btn-primary">Create</button>
        </div>
      </form>
    </dialog>

    <!-- Settings dialog -->
    <dialog id="settings-dialog" class="dialog">
      <form method="dialog" id="settings-form">
        <h3>Settings</h3>

        <fieldset class="settings-group">
          <legend>Voice</legend>
          <label class="field">
            <span>STT / TTS status</span>
            <div id="voice-status" class="voice-status">Checking…</div>
          </label>
          <label class="field">
            <span>TTS voice</span>
            <select id="voice-select" disabled></select>
          </label>
          <label class="check">
            <input id="auto-speak" type="checkbox" />
            <span>Auto-speak assistant replies</span>
          </label>
          <label class="check">
            <input id="dictate-tap" type="checkbox" />
            <span>Tap mic to dictate (hold to record)</span>
          </label>
        </fieldset>

        <fieldset class="settings-group">
          <legend>Display</legend>
          <label class="check">
            <input id="show-tools" type="checkbox" checked />
            <span>Show tool calls &amp; results</span>
          </label>
        </fieldset>

        <div class="dialog-actions">
          <button type="submit" value="save" class="btn btn-primary">Done</button>
        </div>
      </form>
    </dialog>

    <!-- Login dialog -->
    <dialog id="login-dialog" class="dialog login-dialog">
      <form method="dialog" id="login-form">
        <div class="login-brand">
          <img src="icon.svg" alt="" width="40" height="40" />
          <h2>Forge</h2>
        </div>
        <p class="login-sub">Sign in to your agents</p>
        <div id="login-error" class="login-error" hidden></div>
        <label class="field">
          <span>Email</span>
          <input id="login-email" type="email" required autocomplete="email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="login-password" type="password" required autocomplete="current-password" />
        </label>
        <div class="dialog-actions">
          <button type="button" id="register-toggle" class="btn btn-ghost">Create account</button>
          <button type="submit" value="login" class="btn btn-primary" id="login-submit">Log in</button>
        </div>
      </form>
    </dialog>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
